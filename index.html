<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIBE POTENTIAL</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a0a2e;color:#fff0fb;font-family:'Space Mono',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;transition:background 2s}
#bb{position:fixed;inset:0;pointer-events:none;z-index:0;transition:background 2s;background:radial-gradient(ellipse at 10% 90%,rgba(255,110,199,.14) 0%,transparent 50%),radial-gradient(ellipse at 90% 10%,rgba(0,229,255,.12) 0%,transparent 50%),radial-gradient(ellipse at 50% 110%,rgba(255,138,128,.10) 0%,transparent 45%),radial-gradient(ellipse at 50% -10%,rgba(201,184,255,.08) 0%,transparent 45%)}
#bgrid{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(255,110,199,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.015) 1px,transparent 1px);background-size:60px 60px;transition:opacity 2s;opacity:.6}
#ps{position:fixed;inset:0;pointer-events:none;z-index:0;display:none;animation:strobe .6s infinite}
@keyframes strobe{0%,49%{background:rgba(255,30,30,.08)}50%,100%{background:rgba(30,80,255,.08)}}
.w{position:relative;z-index:1;width:100%;max-width:600px;display:flex;flex-direction:column;align-items:center;gap:22px}

/* SCENE */
.scene{width:100%;position:relative;height:130px;display:flex;align-items:center;justify-content:center}
.sun{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:68px;height:68px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#fff7a0,#ffb347 40%,#ff6ec7 100%);box-shadow:0 0 30px rgba(255,179,71,.6),0 0 60px rgba(255,110,199,.4);animation:sp 4s ease-in-out infinite;z-index:4;transition:width 2s,height 2s,background 2s,box-shadow 2s,top 2s}
@keyframes sp{0%,100%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.07)}}
.rays{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:68px;height:68px;z-index:3;animation:rot 20s linear infinite;transition:width 2s,height 2s,top 2s}
@keyframes rot{to{transform:translateX(-50%) rotate(360deg)}}
.rays::before,.rays::after{content:'';position:absolute;border-radius:50%;transition:border-color 2s}
.rays::before{inset:-20px;border:1px dashed rgba(255,179,71,.2)}.rays::after{inset:-36px;border:1px dashed rgba(255,110,199,.15)}
.sg{position:absolute;z-index:5;transition:opacity 2s}.sg svg{fill:none;stroke:#c9b8ff;stroke-width:2;stroke-linecap:round;transition:stroke 2s}
.s1{top:14px;left:7%;animation:g1 8s ease-in-out infinite}
.s2{top:32px;left:15%;animation:g2 10s ease-in-out infinite 1s}
.s3{top:10px;right:9%;animation:g1 9s ease-in-out infinite 2s}
.s4{top:40px;right:17%;animation:g2 7s ease-in-out infinite .5s}
.s5{top:22px;right:30%;animation:g1 11s ease-in-out infinite 3s}
@keyframes g1{0%,100%{transform:translate(0,0)}25%{transform:translate(4px,-6px)}50%{transform:translate(8px,-2px)}75%{transform:translate(4px,-8px)}}
@keyframes g2{0%,100%{transform:translate(0,0)}33%{transform:translate(-5px,-5px)}66%{transform:translate(-2px,-9px)}}

/* SCENE ELEMENTS - all hidden by default */
.el{position:absolute;z-index:2;opacity:0;transition:opacity 1.5s ease 0.5s}
.el.show{opacity:1}

/* Police bar */
#pb{display:none;width:100%;height:11px;background:linear-gradient(90deg,#ff1e1e 0%,#ff1e1e 20%,#222 20%,#222 30%,#1e50ff 30%,#1e50ff 50%,#222 50%,#222 60%,#ff1e1e 60%,#ff1e1e 80%,#222 80%,#222 90%,#1e50ff 90%,#1e50ff 100%);animation:bf .6s infinite;border-radius:2px}
@keyframes bf{0%,49%{opacity:1}50%,100%{opacity:.4}}

/* Title */
.tw{position:relative;height:66px;display:flex;align-items:center;justify-content:center;width:100%;margin-bottom:12px}
.t1,.t2,.t3{font-family:'Black Ops One',cursive;line-height:1;text-align:center;position:absolute;width:100%;transition:opacity .7s,transform .7s}
.t1{font-size:clamp(36px,9vw,70px);letter-spacing:4px;background:linear-gradient(135deg,#00e5ff 0%,#c9b8ff 40%,#ff6ec7 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:tp 5s ease-in-out infinite}
@keyframes tp{0%,100%{filter:drop-shadow(0 0 30px rgba(255,110,199,.3))}50%{filter:drop-shadow(0 0 50px rgba(255,110,199,.5))}}
.t2{font-size:clamp(22px,5.5vw,48px);letter-spacing:3px;color:#ffe566;-webkit-text-fill-color:#ffe566;text-shadow:0 0 40px rgba(255,229,102,.6);opacity:0;transform:translateY(10px)}
.t3{font-size:clamp(30px,7.5vw,60px);letter-spacing:6px;background:linear-gradient(135deg,#ff1e1e,#fff,#1e50ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:pf .6s infinite;opacity:0;transform:translateY(10px)}
@keyframes pf{0%,49%{filter:drop-shadow(0 0 20px rgba(255,30,30,.8))}50%,100%{filter:drop-shadow(0 0 20px rgba(30,80,255,.8))}}
.hid{opacity:0!important;transform:translateY(-10px)!important;animation:none!important}
.vis{opacity:1!important;transform:translateY(0)!important}

/* Input */
.ilbl{font-size:9px;letter-spacing:5px;color:#00f5c4;text-transform:uppercase;margin-bottom:8px;display:block}
textarea{width:100%;background:rgba(35,16,58,.7);border:1px solid #6b4d7a;color:#fff0fb;font-family:'Space Mono',monospace;font-size:14px;line-height:1.7;padding:14px;resize:none;height:88px;outline:none;transition:border-color .3s;caret-color:#ff6ec7}
textarea:focus{border-color:#ff6ec7;box-shadow:0 0 0 1px #ff6ec7}
.btn{width:100%;padding:17px;background:transparent;border:1px solid #ff6ec7;color:#ff6ec7;font-family:'Black Ops One',cursive;font-size:20px;letter-spacing:10px;cursor:pointer;transition:all .3s;text-shadow:0 0 20px rgba(255,110,199,.6)}
.btn:hover{background:rgba(255,110,199,.07);color:#fff0fb}
.btn:disabled{border-color:#6b4d7a;color:#6b4d7a;cursor:not-allowed;text-shadow:none}

/* Loading / error */
.ld{display:none;text-align:center;padding:12px;color:#6b4d7a;font-size:10px;letter-spacing:4px;text-transform:uppercase}
.ld.on{display:block}
.ld::after{content:'';display:inline-block;width:4px;height:4px;background:#ff6ec7;border-radius:50%;margin-left:8px;animation:bl 1s infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:0}}
.er{color:#ff8a80;font-size:11px;text-align:center;display:none;letter-spacing:1px;padding:8px;word-break:break-all;white-space:pre-wrap;background:rgba(255,30,30,.05);border:1px solid rgba(255,30,30,.2)}
.er.on{display:block}

/* Scale */
.sw{width:100%;opacity:0;transform:translateY(14px);transition:opacity .6s,transform .6s}
.sw.on{opacity:1;transform:translateY(0)}
.slbls{display:flex;justify-content:space-between;font-size:9px;letter-spacing:3px;text-transform:uppercase;margin-bottom:7px}
.u{color:#ff8a80}.c{color:#00f5c4}.s{color:#ffe566}
.track{width:100%;height:7px;background:linear-gradient(90deg,#ff8a80 0%,#00f5c4 50%,#ffe566 100%);position:relative;opacity:.4;margin-bottom:4px}
.mk{position:absolute;top:50%;transform:translate(-50%,-50%);width:17px;height:17px;background:#fff0fb;border-radius:50%;box-shadow:0 0 10px rgba(255,255,255,.6);transition:left 1.4s cubic-bezier(.23,1,.32,1);left:50%}
.zn{text-align:center;font-family:'Black Ops One',cursive;font-size:24px;letter-spacing:4px;margin:9px 0 3px}

/* Citation */
.cw{width:100%;opacity:0;transform:translateY(14px);transition:opacity .6s .2s,transform .6s .2s;display:none}
.cw.on{opacity:1;transform:translateY(0)}
.cbox{border:2px solid #ff1e1e;background:rgba(20,0,0,.8);padding:18px;position:relative;overflow:hidden}
.cbox::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#ff1e1e,#1e50ff,#ff1e1e,#1e50ff);animation:bf .6s infinite}
.ch{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.bdg{font-size:26px;animation:bs 2s ease-in-out infinite}
@keyframes bs{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}
.ct{font-family:'Black Ops One',cursive;font-size:11px;letter-spacing:4px;color:#ff6060}
.cs{font-size:10px;letter-spacing:2px;color:#884444;margin-top:2px}
.ctxt{font-size:13px;line-height:1.8;color:#ffaaaa;font-style:italic;border-left:2px solid #ff1e1e;padding-left:12px}
.vts{display:flex;flex-wrap:wrap;gap:7px;margin-top:11px}
.vt{padding:3px 11px;border:1px solid #ff1e1e;font-size:9px;letter-spacing:3px;color:#ff6060;text-transform:uppercase}

/* Reading */
.rw{width:100%;opacity:0;transform:translateY(14px);transition:opacity .6s .2s,transform .6s .2s}
.rw.on{opacity:1;transform:translateY(0)}
.rlbl{font-size:9px;letter-spacing:4px;color:#c9b8ff;text-transform:uppercase;margin-bottom:7px;display:block}
.rdg{background:rgba(35,16,58,.7);border-left:2px solid #c9b8ff;padding:13px 16px;font-size:13px;line-height:1.8;color:#c0a0d8;font-style:italic}
.tgs{display:flex;flex-wrap:wrap;gap:7px;margin-top:11px}
.tg{padding:3px 11px;border:1px solid #6b4d7a;font-size:9px;letter-spacing:3px;color:#00f5c4;text-transform:uppercase}

.keywrap{width:100%;background:rgba(35,16,58,.9);border:1px solid #6b4d7a;padding:16px;display:none}
.keywrap p{font-size:10px;letter-spacing:3px;color:#c9b8ff;text-transform:uppercase;margin-bottom:10px}
.keyrow{display:flex;gap:8px}
.keyrow input{flex:1;background:rgba(0,0,0,.3);border:1px solid #6b4d7a;color:#fff0fb;font-family:Space Mono,monospace;font-size:12px;padding:10px;outline:none;caret-color:#ff6ec7}
.keyrow input:focus{border-color:#ff6ec7}
.keybtn{padding:10px 16px;background:transparent;border:1px solid #ff6ec7;color:#ff6ec7;font-family:Black Ops One,cursive;font-size:12px;letter-spacing:2px;cursor:pointer;white-space:nowrap}
.keyconfirm{width:100%;text-align:center;font-size:9px;letter-spacing:3px;color:#6b4d7a;text-transform:uppercase;display:none;cursor:pointer}
.keyconfirm:hover{color:#c9b8ff}
</style>
</head>
<body>
<div id="bb"></div><div id="bgrid"></div><div id="bgimg" style="position:fixed;inset:0;pointer-events:none;z-index:0;background-size:cover;background-position:center;background-repeat:no-repeat;opacity:0;transition:opacity 2s ease;"></div>
<div id="ps"></div>
<div class="w">
  <div class="keywrap" id="keywrap">
    <p>Enter your Anthropic API key to use Vibe Potential</p>
    <div class="keyrow">
      <input type="password" id="apikey" placeholder="sk-ant-api03-..."/>
      <button class="keybtn" onclick="saveKey()">SAVE</button>
    </div>
  </div>
  <div class="keyconfirm" id="keyconfirm" onclick="showKeyInput()">api key set &mdash; tap to change</div>
  <div class="scene" id="scene">
    <!-- Seagulls -->
    <div class="sg s1"><svg width="28" height="14" viewBox="0 0 28 14"><path d="M1 8 Q7 2 14 7 Q21 2 27 8"/></svg></div>
    <div class="sg s2"><svg width="20" height="10" viewBox="0 0 20 10"><path d="M1 6 Q5 1 10 5 Q15 1 19 6"/></svg></div>
    <div class="sg s3"><svg width="24" height="12" viewBox="0 0 24 12"><path d="M1 7 Q6 1 12 6 Q18 1 23 7"/></svg></div>
    <div class="sg s4"><svg width="18" height="9" viewBox="0 0 18 9"><path d="M1 5 Q4.5 1 9 4.5 Q13.5 1 17 5"/></svg></div>
    <div class="sg s5"><svg width="22" height="11" viewBox="0 0 22 11"><path d="M1 6 Q5.5 1 11 5.5 Q16.5 1 21 6"/></svg></div>
    <div class="rays" id="rays"></div>
    <div class="sun" id="sun"></div>

    <!-- SCENE ELEMENT LIBRARY - all hidden until called -->

    <!-- stars: scattered dots across upper scene -->
    <div class="el" id="el-stars" style="inset:0;pointer-events:none">
      <svg width="100%" height="100%" viewBox="0 0 600 130" preserveAspectRatio="none">
        <circle class="star-fill" cx="40" cy="15" r="1.5"/><circle class="star-fill" cx="90" cy="30" r="1"/>
        <circle class="star-fill" cx="150" cy="10" r="2"/><circle class="star-fill" cx="200" cy="25" r="1"/>
        <circle class="star-fill" cx="260" cy="8" r="1.5"/><circle class="star-fill" cx="350" cy="20" r="1"/>
        <circle class="star-fill" cx="400" cy="12" r="2"/><circle class="star-fill" cx="450" cy="35" r="1"/>
        <circle class="star-fill" cx="500" cy="8" r="1.5"/><circle class="star-fill" cx="555" cy="22" r="1"/>
        <circle class="star-fill" cx="70" cy="55" r="1"/><circle class="star-fill" cx="130" cy="48" r="1.5"/>
        <circle class="star-fill" cx="480" cy="50" r="1"/><circle class="star-fill" cx="530" cy="45" r="1.5"/>
      </svg>
    </div>

    <!-- moon: crescent top-right -->
    <div class="el" id="el-moon" style="top:5px;right:8%;width:40px;height:40px">
      <svg viewBox="0 0 40 40" fill="none">
        <path class="el-stroke" d="M28 8 Q18 12 18 20 Q18 28 28 32 Q18 34 12 26 Q6 18 10 10 Q14 2 28 8Z" stroke-width="0" class="moon-fill"/>
      </svg>
    </div>

    <!-- palmtree_l: left side -->
    <div class="el" id="el-palmtree_l" style="bottom:0;left:2%;width:70px;height:110px">
      <svg viewBox="0 0 70 110" fill="none">
        <path class="el-stroke" d="M35 110 Q32 80 30 60 Q28 40 33 20" stroke-width="3" stroke-linecap="round"/>
        <path class="el-stroke" d="M33 22 Q20 10 5 15 Q15 22 28 28" stroke-width="2" stroke-linecap="round"/>
        <path class="el-stroke" d="M33 22 Q25 5 35 0 Q38 12 34 26" stroke-width="2" stroke-linecap="round"/>
        <path class="el-stroke" d="M33 22 Q45 8 58 12 Q48 22 36 28" stroke-width="2" stroke-linecap="round"/>
        <path class="el-stroke" d="M33 22 Q18 18 8 28 Q20 28 32 32" stroke-width="2" stroke-linecap="round"/>
        <path class="el-stroke" d="M33 22 Q48 18 60 28 Q48 28 36 32" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>

    <!-- palmtree_r: right side -->
    <div class="el" id="el-palmtree_r" style="bottom:0;right:2%;width:70px;height:110px">
      <svg viewBox="0 0 70 110" fill="none">
        <path class="el-stroke" d="M35 110 Q38 80 40 60 Q42 40 37 20" stroke-width="3" stroke-linecap="round"/>
        <path class="el-stroke" d="M37 22 Q50 10 65 15 Q55 22 42 28" stroke-width="2" stroke-linecap="round"/>
        <path class="el-stroke" d="M37 22 Q45 5 35 0 Q32 12 36 26" stroke-width="2" stroke-linecap="round"/>
        <path class="el-stroke" d="M37 22 Q25 8 12 12 Q22 22 34 28" stroke-width="2" stroke-linecap="round"/>
        <path class="el-stroke" d="M37 22 Q52 18 62 28 Q50 28 38 32" stroke-width="2" stroke-linecap="round"/>
        <path class="el-stroke" d="M37 22 Q22 18 10 28 Q22 28 34 32" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>

    <!-- clouds: fluffy, upper left area -->
    <div class="el" id="el-clouds" style="top:8px;left:3%;width:120px;height:45px">
      <svg viewBox="0 0 120 45" fill="none">
        <ellipse class="el-fill" cx="45" cy="30" rx="30" ry="14" opacity=".7"/>
        <ellipse class="el-fill" cx="65" cy="24" rx="22" ry="16" opacity=".8"/>
        <ellipse class="el-fill" cx="30" cy="26" rx="18" ry="12" opacity=".6"/>
        <ellipse class="el-fill" cx="85" cy="28" rx="20" ry="12" opacity=".65"/>
      </svg>
    </div>

    <!-- stormcloud: dark angry, upper center-left -->
    <div class="el" id="el-stormcloud" style="top:4px;left:5%;width:140px;height:50px">
      <svg viewBox="0 0 140 50" fill="none">
        <ellipse class="el-fill" cx="55" cy="32" rx="38" ry="16" opacity=".9"/>
        <ellipse class="el-fill" cx="78" cy="26" rx="28" ry="18" opacity=".95"/>
        <ellipse class="el-fill" cx="35" cy="28" rx="22" ry="14" opacity=".8"/>
        <ellipse class="el-fill" cx="100" cy="30" rx="24" ry="14" opacity=".85"/>
      </svg>
    </div>

    <!-- lightning: bolt, hangs from stormcloud area -->
    <div class="el" id="el-lightning" style="top:38px;left:12%;width:24px;height:50px">
      <svg viewBox="0 0 24 50" fill="none">
        <path class="el-fill-stroke" d="M14 0 L6 22 L12 22 L4 50 L18 20 L11 20 Z"/>
      </svg>
    </div>

    <!-- waves: bottom of scene -->
    <div class="el" id="el-waves" style="bottom:0;left:0;right:0;height:28px">
      <svg width="100%" height="28" viewBox="0 0 600 28" preserveAspectRatio="none">
        <path class="el-stroke" d="M0 20 Q75 8 150 20 Q225 32 300 20 Q375 8 450 20 Q525 32 600 20" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path class="el-stroke" d="M0 26 Q75 14 150 26 Q225 38 300 26 Q375 14 450 26 Q525 38 600 26" stroke-width="1.5" fill="none" stroke-linecap="round" opacity=".5"/>
      </svg>
    </div>

    <!-- mountain: silhouette bottom -->
    <div class="el" id="el-mountain" style="bottom:0;left:0;right:0;height:70px">
      <svg width="100%" height="70" viewBox="0 0 600 70" preserveAspectRatio="none">
        <path class="el-fill" d="M0 70 L120 20 L200 50 L300 5 L400 45 L480 15 L600 70 Z" opacity=".35"/>
        <path class="el-stroke" d="M120 20 L200 50 L300 5 L400 45 L480 15" stroke-width="1.5" fill="none" opacity=".6"/>
      </svg>
    </div>

    <!-- cityline: skyline silhouette bottom -->
    <div class="el" id="el-cityline" style="bottom:0;left:0;right:0;height:65px">
      <svg width="100%" height="65" viewBox="0 0 600 65" preserveAspectRatio="none">
        <path class="el-fill" d="M0 65 L0 40 L30 40 L30 25 L50 25 L50 35 L70 35 L70 15 L90 15 L90 35 L110 35 L110 20 L130 20 L130 40 L160 40 L160 30 L175 30 L175 45 L200 45 L200 28 L220 28 L220 10 L240 10 L240 28 L260 28 L260 38 L280 38 L280 22 L295 22 L295 38 L320 38 L320 48 L350 48 L350 30 L370 30 L370 18 L390 18 L390 30 L415 30 L415 42 L440 42 L440 25 L460 25 L460 38 L480 38 L480 20 L500 20 L500 38 L525 38 L525 45 L550 45 L550 32 L570 32 L570 45 L600 45 L600 65 Z" opacity=".4"/>
      </svg>
    </div>

    <!-- rainbow: arc, upper area -->
    <div class="el" id="el-rainbow" style="bottom:10px;left:0;right:0;height:80px">
      <svg width="100%" height="80" viewBox="0 0 600 80" preserveAspectRatio="none">
        <path d="M50 80 Q300 -20 550 80" stroke="#ff6ec7" stroke-width="3" fill="none" opacity=".5"/>
        <path d="M70 80 Q300 0 530 80" stroke="#ffe566" stroke-width="2.5" fill="none" opacity=".4"/>
        <path d="M90 80 Q300 15 510 80" stroke="#00f5c4" stroke-width="2" fill="none" opacity=".35"/>
      </svg>
    </div>

    <!-- fog: misty layer bottom -->
    <div class="el" id="el-fog" style="bottom:0;left:0;right:0;height:40px">
      <svg width="100%" height="40" viewBox="0 0 600 40" preserveAspectRatio="none">
        <ellipse class="el-fill" cx="100" cy="35" rx="120" ry="18" opacity=".3"/>
        <ellipse class="el-fill" cx="300" cy="38" rx="160" ry="16" opacity=".25"/>
        <ellipse class="el-fill" cx="500" cy="34" rx="130" ry="18" opacity=".3"/>
        <ellipse class="el-fill" cx="200" cy="40" rx="100" ry="14" opacity=".2"/>
        <ellipse class="el-fill" cx="420" cy="40" rx="110" ry="14" opacity=".2"/>
      </svg>
    </div>

    <!-- hotairballoon: floating upper right -->
    <div class="el" id="el-hotairballoon" style="top:5px;right:14%;width:44px;height:70px">
      <svg viewBox="0 0 44 70" fill="none">
        <ellipse class="el-fill" cx="22" cy="22" rx="18" ry="20" opacity=".85"/>
        <path class="el-stroke" d="M22 2 Q8 10 8 22 Q8 38 22 42 Q36 38 36 22 Q36 10 22 2Z" stroke-width="1" opacity=".5"/>
        <line class="el-stroke" x1="14" y1="42" x2="12" y2="52" stroke-width="1.2"/>
        <line class="el-stroke" x1="22" y1="42" x2="22" y2="52" stroke-width="1.2"/>
        <line class="el-stroke" x1="30" y1="42" x2="32" y2="52" stroke-width="1.2"/>
        <rect class="el-fill" x="10" y="52" width="24" height="12" rx="2" opacity=".9"/>
      </svg>
    </div>

    <!-- cactus: left or right side -->
    <div class="el" id="el-cactus" style="bottom:0;left:4%;width:50px;height:85px">
      <svg viewBox="0 0 50 85" fill="none">
        <rect class="el-fill" x="19" y="20" width="12" height="65" rx="6"/>
        <rect class="el-fill" x="6" y="40" width="13" height="8" rx="4"/>
        <rect class="el-fill" x="6" y="30" width="8" height="20" rx="4"/>
        <rect class="el-fill" x="31" y="48" width="13" height="8" rx="4"/>
        <rect class="el-fill" x="36" y="38" width="8" height="22" rx="4"/>
      </svg>
    </div>

    <!-- snowflakes: winter vibes -->
    <div class="el" id="el-snow" style="inset:0;pointer-events:none">
      <svg width="100%" height="100%" viewBox="0 0 600 130">
        <g class="el-stroke" stroke-width="1.5" opacity=".6">
          <line x1="60" y1="20" x2="60" y2="36"/><line x1="52" y1="28" x2="68" y2="28"/><line x1="54" y1="22" x2="66" y2="34"/><line x1="66" y1="22" x2="54" y2="34"/>
          <line x1="180" y1="50" x2="180" y2="62"/><line x1="174" y1="56" x2="186" y2="56"/><line x1="175" y1="51" x2="185" y2="61"/><line x1="185" y1="51" x2="175" y2="61"/>
          <line x1="400" y1="15" x2="400" y2="31"/><line x1="392" y1="23" x2="408" y2="23"/><line x1="394" y1="17" x2="406" y2="29"/><line x1="406" y1="17" x2="394" y2="29"/>
          <line x1="520" y1="40" x2="520" y2="52"/><line x1="514" y1="46" x2="526" y2="46"/><line x1="515" y1="41" x2="525" y2="51"/><line x1="525" y1="41" x2="515" y2="51"/>
          <line x1="300" y1="60" x2="300" y2="70"/><line x1="295" y1="65" x2="305" y2="65"/>
        </g>
      </svg>
    </div>

    <!-- fire: chaotic energy bottom -->
    <div class="el" id="el-fire" style="bottom:0;left:0;right:0;height:45px">
      <svg width="100%" height="45" viewBox="0 0 600 45" preserveAspectRatio="none">
        <path class="el-fill" d="M0 45 Q30 20 60 35 Q90 15 120 30 Q150 5 180 25 Q210 10 240 28 Q270 0 300 20 Q330 5 360 25 Q390 12 420 30 Q450 8 480 28 Q510 15 540 32 Q570 18 600 35 L600 45 Z" opacity=".6"/>
      </svg>
    </div>
  </div>

  <div id="pb"></div>
  <div class="tw">
    <div class="t1" id="t1">VIBE POTENTIAL</div>
    <div class="t2" id="t2"></div>
    <div class="t3" id="t3">VIBE POLICE</div>
  </div>
  <div style="width:100%">
    <label class="ilbl">Describe anything</label>
    <textarea id="inp"></textarea>
  </div>
  <button class="btn" id="btn" onclick="go()">VIBE</button>
  <div class="ld" id="ld">consulting the vibologist</div>
  <div class="er" id="er"></div>
  <div class="sw" id="sw">
    <div class="slbls"><span class="u">Unchill</span><span class="c">Chill</span><span class="s">Stoked</span></div>
    <div class="track"><div class="mk" id="mk"></div></div>
    <div class="zn" id="zn"></div>
  </div>
  <div class="cw" id="cw">
    <div class="cbox">
      <div class="ch"><div class="bdg">🚨</div><div><div class="ct">Official Vibe Citation</div><div class="cs">Vibe Police Dept — Enforcement Division</div></div></div>
      <div class="ctxt" id="ctxt"></div>
      <div class="vts" id="vts"></div>
    </div>
  </div>
  <div class="rw" id="rw">
    <span class="rlbl">Vibologist Report</span>
    <div class="rdg" id="rdg"></div>
    <div class="tgs" id="tgs"></div>
  </div>
</div>

<script>
var ZC={unchill:{text:'#ff8a80',glow:'rgba(255,138,128,.5)'},chill:{text:'#00f5c4',glow:'rgba(0,245,196,.5)'},stoked:{text:'#ffe566',glow:'rgba(255,229,102,.5)'}};

var ALL_ELS=['stars','moon','palmtree_l','palmtree_r','clouds','stormcloud','lightning','waves','mountain','cityline','rainbow','fog','hotairballoon','cactus','snow','fire'];

function hideAllElements(){
  ALL_ELS.forEach(function(id){
    var el=document.getElementById('el-'+id);
    if(el){el.classList.remove('show');}
  });
}

function applyElements(elements){
  hideAllElements();
  if(!elements||!elements.length)return;
  elements.forEach(function(e){
    var el=document.getElementById('el-'+e.id);
    if(!el)return;
    var color=e.color||'#c9b8ff';
    // Apply color to all colorable parts
    el.querySelectorAll('.el-stroke').forEach(function(path){path.style.stroke=color;path.style.fill='none';});
    el.querySelectorAll('.el-fill').forEach(function(path){path.style.fill=color;path.style.stroke='none';});
    el.querySelectorAll('.el-fill-stroke').forEach(function(path){path.style.fill=color;path.style.stroke=color;});
    el.querySelectorAll('.star-fill').forEach(function(path){path.style.fill=color;});
    el.querySelectorAll('.moon-fill').forEach(function(path){path.style.fill=color;path.style.stroke='none';});
    setTimeout(function(){el.classList.add('show');},600);
  });
}

function applyScene(s){
  var sun=document.getElementById('sun');
  var rays=document.getElementById('rays');
  var grid=document.getElementById('bgrid');
  if(s.sunSize){sun.style.width=s.sunSize+'px';sun.style.height=s.sunSize+'px';rays.style.width=s.sunSize+'px';rays.style.height=s.sunSize+'px';}
  if(s.sunBg){sun.style.background=s.sunBg;}
  if(s.sunGlow){sun.style.boxShadow=s.sunGlow;}
  if(s.raySpeed){rays.style.animationDuration=s.raySpeed+'s';}
  if(s.sgColor){document.querySelectorAll('.sg svg').forEach(function(el){el.style.stroke=s.sgColor;});}
  if(s.sgOpacity!=null){document.querySelectorAll('.sg').forEach(function(el){el.style.opacity=s.sgOpacity;});}
  if(s.gridColor){grid.style.backgroundImage='linear-gradient('+s.gridColor+' 1px,transparent 1px),linear-gradient(90deg,'+s.gridColor+' 1px,transparent 1px)';}
  if(s.gridSize){grid.style.backgroundSize=s.gridSize+'px '+s.gridSize+'px';}
  if(s.gridOpacity!=null){grid.style.opacity=s.gridOpacity;}
}

function setBg(p){
  document.body.style.background=p.bg;
  document.getElementById('bb').style.background='radial-gradient(ellipse at 10% 90%,'+p.blob1+' 0%,transparent 50%),radial-gradient(ellipse at 90% 10%,'+p.blob2+' 0%,transparent 50%),radial-gradient(ellipse at 50% 110%,'+p.blob3+' 0%,transparent 45%),radial-gradient(ellipse at 50% -10%,'+p.blob4+' 0%,transparent 45%)';
}

function reset(){
  var bgimg=document.getElementById('bgimg');
  bgimg.style.opacity='0';
  bgimg.style.backgroundImage='none';
  document.getElementById('bb').style.opacity='1';
  document.getElementById('t1').className='t1';
  document.getElementById('t2').className='t2';
  document.getElementById('t3').className='t3';
  document.getElementById('pb').style.display='none';
  document.getElementById('ps').style.display='none';
  document.getElementById('sw').className='sw';
  document.getElementById('rw').className='rw';
  var cw=document.getElementById('cw');cw.style.display='none';cw.className='cw';
  hideAllElements();
  document.body.style.background='#1a0a2e';
  document.getElementById('bb').style.background='radial-gradient(ellipse at 10% 90%,rgba(255,110,199,.14) 0%,transparent 50%),radial-gradient(ellipse at 90% 10%,rgba(0,229,255,.12) 0%,transparent 50%),radial-gradient(ellipse at 50% 110%,rgba(255,138,128,.10) 0%,transparent 45%),radial-gradient(ellipse at 50% -10%,rgba(201,184,255,.08) 0%,transparent 45%)';
  applyScene({sunSize:68,sunBg:'radial-gradient(circle at 40% 35%,#fff7a0,#ffb347 40%,#ff6ec7 100%)',sunGlow:'0 0 30px rgba(255,179,71,.6),0 0 60px rgba(255,110,199,.4)',raySpeed:20,sgColor:'#c9b8ff',sgOpacity:0.85,gridColor:'rgba(255,110,199,.015)',gridSize:60,gridOpacity:0.6});
}

function showErr(msg){var e=document.getElementById('er');e.textContent=msg;e.className='er on';}

var SYS = 'You are the Vibologist. Return ONLY raw valid JSON, no markdown.\n\n'
  + 'Available scene elements: stars, moon, palmtree_l, palmtree_r, clouds, stormcloud, lightning, waves, mountain, cityline, rainbow, fog, hotairballoon, cactus, snow, fire\n\n'
  + 'Pick 1-3 elements that match the vibe. Assign each a color (hex or rgba). Examples:\n'
  + 'tropical stoked -> palmtree_l + palmtree_r + waves in warm teal\n'
  + 'late night chill -> stars + moon + fog in cool lavender\n'
  + 'storm unchill -> stormcloud + lightning + fire in sickly yellow-green\n'
  + 'cozy -> clouds + mountain + fog in soft warm tones\n'
  + 'city -> cityline + moon + fog in blue-gray\n\n'
  + 'For vibePolice (score<=15 or harmful):\n'
  + '{"vibePolice":true,"citation":"You are hereby cited for...","violations":["tag1","tag2"],'
  + '"palette":{"bg":"#0a0000","blob1":"rgba(255,30,30,0.18)","blob2":"rgba(30,80,255,0.15)","blob3":"rgba(255,30,30,0.12)","blob4":"rgba(30,80,255,0.10)"},'
  + '"scene":{"sunSize":38,"sunBg":"radial-gradient(circle at 50% 50%,#3a0000,#660000 60%,#1a0000 100%)","sunGlow":"0 0 15px rgba(180,0,0,.5)","raySpeed":70,"sgColor":"rgba(120,40,40,.5)","sgOpacity":0.2,"gridColor":"rgba(150,0,0,.05)","gridSize":55,"gridOpacity":0.5},'
  + '"elements":[{"id":"stormcloud","color":"#440000"},{"id":"lightning","color":"#ff3300"}]}\n\n'
  + 'Otherwise:\n'
  + '{"vibePolice":false,"vibeName":"CAPS NAME","score":50,"zone":"chill","reading":"The vibes here...","tags":["a","b","c"],'
  + '"palette":{"bg":"#0d1a2e","blob1":"rgba(0,229,255,0.15)","blob2":"rgba(0,245,196,0.12)","blob3":"rgba(201,184,255,0.10)","blob4":"rgba(0,229,255,0.08)"},'
  + '"scene":{"sunSize":68,"sunBg":"radial-gradient(circle at 40% 35%,#fff7a0,#ffb347 40%,#ff6ec7 100%)","sunGlow":"0 0 30px rgba(255,179,71,.6),0 0 60px rgba(255,110,199,.4)","raySpeed":20,"sgColor":"#c9b8ff","sgOpacity":0.85,"gridColor":"rgba(0,229,255,.015)","gridSize":60,"gridOpacity":0.6},'
  + '"elements":[{"id":"waves","color":"#00e5ff"},{"id":"stars","color":"#c9b8ff"}]}\n\n'
  + 'Scene: STOKED=large sun 80-90px hot gradient fast rays, CHILL=medium 62-72px cool slow rays, UNCHILL=small 35-50px dark sickly slow rays. zone: unchill=1-33, chill=34-66, stoked=67-100.';

function generateImage(prompt) {
  return fetch('https://vibe-potential-api.vercel.app/api/generate', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({prompt: prompt})
  })
  .then(function(r){return r.json();})
  .then(function(d){
    if(d.url){
      var bgimg = document.getElementById('bgimg');
      bgimg.style.backgroundImage = 'url(' + d.url + ')';
      bgimg.style.opacity = '0.55';
      // Fade out the solid bg blobs slightly
      document.getElementById('bb').style.opacity = '0.4';
    }
  })
  .catch(function(e){console.log('Image gen failed:', e);});
}

function go(){
  var inp=document.getElementById('inp').value.trim();
  if(!inp)return;
  if(!getKey()){showErr('No API key set — enter your key above');return;}
  var btn=document.getElementById('btn'),ld=document.getElementById('ld');
  btn.disabled=true;ld.className='ld on';document.getElementById('er').className='er';reset();setTimeout(function(){btn.disabled=false;ld.className='ld';},20000);

  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':getKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:1000,
      system:SYS,
      messages:[{role:'user',content:'Assess the vibes of: '+inp}]
    })
  })
  .then(function(r){
    if(!r.ok){return r.text().then(function(t){throw new Error('HTTP '+r.status+': '+t.substring(0,200));});}
    return r.json();
  })
  .then(function(d){
    ld.className='ld';
    if(d.error){showErr('API: '+d.error.message);btn.disabled=false;return;}
    if(!d.content||!d.content[0]){showErr('Bad response: '+JSON.stringify(d).substring(0,150));btn.disabled=false;return;}
    var raw=d.content[0].text.replace(/^```(?:json)?/,'').replace(/```$/,'').trim();
    var p;
    try{p=JSON.parse(raw);}catch(e){showErr('Parse fail:\n'+raw.substring(0,200));btn.disabled=false;return;}

    setBg(p.palette);
    if(p.scene){setTimeout(function(){applyScene(p.scene);},300);}
    if(p.elements){applyElements(p.elements);}
    if(p.imagePrompt){generateImage(p.imagePrompt);}
    document.getElementById('t1').className='t1 hid';

    if(p.vibePolice){
      document.getElementById('ps').style.display='block';
      document.getElementById('pb').style.display='block';
      setTimeout(function(){document.getElementById('t3').className='t3 vis';},200);
      document.getElementById('ctxt').textContent=p.citation;
      var vts=document.getElementById('vts');vts.innerHTML='';
      (p.violations||[]).forEach(function(v){var e=document.createElement('div');e.className='vt';e.textContent=v;vts.appendChild(e);});
      var cw=document.getElementById('cw');cw.style.display='block';
      setTimeout(function(){cw.className='cw on';},400);
    } else {
      var t2=document.getElementById('t2');t2.textContent=p.vibeName||'UNNAMED VIBE';
      setTimeout(function(){t2.className='t2 vis';},200);
      var zc=ZC[p.zone]||ZC.chill;
      document.getElementById('sw').className='sw on';
      setTimeout(function(){
        document.getElementById('mk').style.left=(p.score||50)+'%';
        var zn=document.getElementById('zn');
        zn.textContent=(p.zone||'chill').toUpperCase();
        zn.style.color=zc.text;
        zn.style.textShadow='0 0 30px '+zc.glow;
      },300);
      document.getElementById('rdg').textContent=p.reading||'';
      var tgs=document.getElementById('tgs');tgs.innerHTML='';
      (p.tags||[]).forEach(function(t){var e=document.createElement('div');e.className='tg';e.textContent=t;tgs.appendChild(e);});
      setTimeout(function(){document.getElementById('rw').className='rw on';},400);
    }
    btn.disabled=false;
  })
  .catch(function(e){ld.className='ld';showErr('signal lost: '+e.message);btn.disabled=false;});
}
document.getElementById('inp').addEventListener('keydown',function(e){if(e.key==='Enter'&&e.metaKey)go();});

function getKey(){return localStorage.getItem('vp_api_key')||'';}
function saveKey(){
  var k=document.getElementById('apikey').value.trim();
  if(k){
    localStorage.setItem('vp_api_key',k);
    document.getElementById('keywrap').style.display='none';
    document.getElementById('keyconfirm').style.display='block';
  }
}
function showKeyInput(){
  document.getElementById('keywrap').style.display='block';
  document.getElementById('keyconfirm').style.display='none';
  document.getElementById('apikey').value='';
}
window.onload=function(){
  if(!getKey()){document.getElementById('keywrap').style.display='block';}
  else{document.getElementById('keyconfirm').style.display='block';}
};
</script>
</body>
</html>
